# CI coverage gate (owner decision 2026-07-02: "start being more strict with
# the CI"). The deploy workflow runs a bare `poetry run pytest ...`, which
# picks these addopts up — so the coverage floor gates the deploy WITHOUT a
# workflow-file change. Measured full-suite coverage on 2026-07-02: 88%
# (11,437 stmts); floor set at 85 for headroom.
#
# NOTE for partial/local runs: fail-under applies to whatever subset you run,
# so quick one-file runs should keep using the repo convention
#   pytest ... --no-cov -p no:cacheprovider -o addopts=""
# which neutralizes this gate.
[pytest]
# Explicitly put backend/ on sys.path: conftest loads plugins as `tests.*`,
# and the CI poetry env (unlike local venvs) doesn't otherwise guarantee the
# rootdir is importable once an inifile exists.
pythonpath = .
addopts = --cov=app --cov-report=term --cov-fail-under=85
