quizzical:
  app:
    name: quafel
    environment: local
    debug: true
  feature_flags:
    flow_mode: agent
  cors:
    origins:
    - http://localhost:5173
    - http://127.0.0.1:5173
  project:
    api_prefix: /api/v1
  retrieval:
    policy: media_only
    allow_wikipedia: false
    allow_web: false
    max_calls_per_run: 0
    allowed_domains: null
  # §21 — Pre-Computed Topic Knowledge Packs (Phase 2 read-path shim).
  # Phase 9: enabled locally for starter-pack import smoke testing. The
  # read-path is observability-only today (cache + Link header preload);
  # the live agent still produces the user-visible quiz.
  precompute:
    enabled: true
    thresholds:
      match: 0.86
      pass_score: 7
      strong_trigger_score: 5
  # DRAFT — Q&A icon enrichment. OFF by default: when qa_icons_enabled is false
  # the build-time Q&A → brand-icon binder in builder.py::run_build is a strict
  # no-op (the local embedder is never imported/loaded; the built pack is
  # byte-for-byte unchanged). tau ≈ 0.64 is the validated operating point for the
  # local bge-small-en-v1.5 model (rich captions + BGE query prefix). Flip
  # qa_icons_enabled to true ONLY after the FE rendering + caption-authoring +
  # FAL ledger work lands (see the qa-icons backend PR).
  images:
    qa_icons_enabled: false
    tau: 0.64
    model: BAAI/bge-small-en-v1.5
    dim: 384
    query_prefix: 'Represent this sentence for searching relevant passages: '
  quiz:
    min_characters: 2
    max_characters: 32
    baseline_questions_n: 6
    max_options_m: 6
    # AC-QUALITY-QCOUNT-1 / topic-aware depth (2026-06-30) — knobs that control
    # quiz length; all read live from config (config.py QuizConfig) so they stay
    # tunable without code changes.
    #   - min_questions_before_early_finish: the GLOBAL FLOOR. The agent CANNOT
    #     finish before this many answered questions, regardless of confidence.
    #     Owner decision: 12 for casual/non-canonical topics. RIGOROUS instruments
    #     (DISC, MBTI, Big Five, …) raise their OWN floor via per-instrument
    #     min_items below (canonical_sets.min_items), all clamped to [12, 24].
    #   - max_total_questions: the HARD CAP (forced finish). Owner: NEVER exceed
    #     24 — "no one wants to do more than 24". 24 is also the config ceiling.
    #   - depth_floor_min: absolute lower bound for the topic-aware effective
    #     floor clamp (12, mirrors the owner "floor 12").
    #   - baseline_questions_n: the upfront batch (1 LLM call, unchanged at 6).
    # Cost/latency note: each ADAPTIVE question past the baseline is one extra
    # paid LLM call (next_question_generator) PLUS one decide_next_step call per
    # /quiz/next (~2 paid calls each). This app had a cost-abuse P0, so casual
    # topics stay at the 12 floor and ONLY tagged rigorous instruments raise it.
    max_total_questions: 24
    min_questions_before_early_finish: 12
    depth_floor_min: 12
    early_finish_confidence: 0.85
    first_step_timeout_s: 90.0
    stream_budget_s: 30.0
    # Per-character profile_writer fan-out. Capped at 8 (AC-PERF-CHAR-2):
    # higher values empirically trigger Gemini ``503 ServiceUnavailable``
    # cascades on quizzes with ≥ 13 archetypes — ~40 % of profiles return
    # empty after retry exhaustion, leaving the user with broken cards
    # (and previously a CHECK-constraint cascade that broke image loading
    # too — see AC-START-11). 8 keeps a typical 13-outcome quiz to two
    # short waves while staying well clear of the per-minute LLM quota.
    character_concurrency: 8
    # Skip the single-shot profile_batch_writer call when there are more
    # archetypes than this — the batch JSON otherwise overflows the model's
    # output-token budget and we waste ~30s on a doomed call before falling
    # back to per-character requests. (AC-PERF-CHAR-1)
    batch_max_archetypes: 6
    # HITLIST #5 — cap the PAID character-image FAL fan-out. With max_characters
    # up to 32 here, an uncapped canonical set fans out 16-32 paid FAL calls for
    # ~56px cast thumbnails (~$0.18-0.35). 12 keeps the most-relevant cast while
    # bounding worst-case FAL spend; the synopsis-hero + result-hero images are
    # separate pipeline calls and are NOT capped. 0 disables the cap.
    max_character_images: 12
  security:
    # Global daily circuit-breaker on the LIVE paid pipeline (cost backstop).
    # NOT a throttle — a runaway-cost hard ceiling tripped by a distributed
    # botnet across many real IPs. Returns 503 for the rest of the UTC day once
    # hit (no agent run, no image jobs).
    live_cost_guard:
      enabled: true
      # HITLIST #2 (2026-06-30) — the PRIMARY breaker is now a true DOLLAR
      # ceiling. Every LLM call records its real litellm.completion_cost and
      # every FAL image records fal_image_cost_usd into a Redis daily CENTS
      # counter; this budget trips the 503 when aggregate spend exceeds it. It
      # gates /start, /proceed AND /next (the old count-cap only gated /start).
      # Sized to ~$100/day for the interim launch window (well above expected
      # legitimate spend at ~$0.10/quiz worst case). Fails OPEN on any Redis/
      # metering fault — never blocks a quiz on a metering bug.
      daily_budget_usd: 100.0
      # Per-FAL-image cost recorded into the daily counter (FAL Schnell ~$0.011).
      fal_image_cost_usd: 0.011
      # SECONDARY coarse backstop (supersedes HITLIST #10's interim count-cap
      # tuning). The dollar breaker above is now the primary control; this
      # start-count still trips first only if a pure flood of starts somehow
      # outruns cost accrual. Kept generous; set 0 to disable.
      max_quiz_starts_per_day: 1000
  agent:
    max_retries: 3
  llm:
    per_call_timeout_s: 60
    tools:
      initial_planner:
        # AC-EVAL-2026-06-29 — switched from gemini/gemini-flash-latest to
        # gpt-4o-mini: the reps=30 live eval found gpt-4o-mini statistically
        # indistinguishable in quality (4.52 vs 4.51; Δ-0.06, paired-t p=0.18,
        # not significant) at ~15x lower cost ($0.14 vs $2.08 /1k calls) and
        # lower p95 (3.0s vs 5.4s). Consistent with the prior NQG/QG/DM switches
        # (no reasoning tax / no JSON truncation). See evals/results/report.md.
        model: gpt-4o-mini
        temperature: 0.2
        max_output_tokens: 2000
        timeout_s: 30
        json_output: true
      character_list_generator:
        model: gemini/gemini-2.5-flash
        temperature: 0.25
        max_output_tokens: 900
        timeout_s: 25
        json_output: true
      synopsis_generator:
        model: gemini/gemini-2.5-flash
        temperature: 0.2
        max_output_tokens: 600
        timeout_s: 25
        json_output: true
      profile_writer:
        # AC-PROD-R12-PERF-1 — switched from gemini/gemini-2.5-flash to
        # gpt-4o-mini. Same R11 root cause as NQG/DM: Gemini reasoning models
        # in the Responses API consume hidden CoT tokens before any visible
        # output and intermittently emit ZERO text_tokens, causing the parser
        # to correctly raise StructuredOutputError. Prod traces show
        # profile_writer retrying 5+ times per character (10s+ wasted per
        # retry storm) and ultimately producing CharacterProfile validation
        # failures or no profile at all. gpt-4o-mini emits no reasoning
        # tokens, so we can also drop the cap from 1600 → 800.
        model: gpt-4o-mini
        temperature: 0.35
        max_output_tokens: 800
        timeout_s: 15
        json_output: true
      profile_batch_writer:
        # AC-EVAL-2026-07-01 — SWITCHED gemini/gemini-flash-latest → gpt-4o-mini.
        # A fresh targeted live eval (reps=20, judge=gemini-2.5-pro) with the new
        # quality-rubric prompt found gpt-4o-mini now STRICTLY DOMINATES the old
        # incumbent: quality 2.81 vs 2.69 (Δ+0.13, paired-t p=0.004, significant),
        # ~15x cheaper ($0.67 vs $9.95 /1k), 100% valid (vs flash's 90%), and
        # coverage up to 91% — the prior 0/50 name-dropping that KEPT us on flash
        # is fixed by the rubric prompt's completeness emphasis. The remaining
        # ~9% missing names are backfilled by the per-character profile_writer
        # fallback (gpt-4o-mini, 100% coverage by construction).
        #
        # AC-EVAL-2026-07-02 — CONFIRMED gpt-4o-mini after adding canonical
        # GROUNDING (character_contexts was always {} — the root cause the
        # 2026-07-01 report flagged). Re-eval (reps=20, judge gemini-2.5-pro,
        # production-shaped enumerated roster + canonical hints):
        #   gpt-4o-mini:          2.20 [2.09,2.32]  100% valid  $0.68/1k  ⬅ WINNER
        #   gemini-flash-latest:  2.07             94% valid    $7.39/1k
        #   gemini-2.5-flash-lite:1.77             56% valid    $0.36/1k  (rejected: validity)
        # gpt-4o-mini remains cost→quality→perf best and the only 100%-valid
        # option. NOTE: still no model clears the 4.0 floor (2.20 best; scores
        # are lower than the 2026-07-01 run because the judge thinking-budget was
        # fixed — see report — so cross-run numbers are indicative, not exact).
        # This is a deeper content ceiling for future prompt/few-shot work,
        # orthogonal to the model choice. The eval's coverage check reads 79% for
        # gpt-4o-mini (name present AND non-empty); production backfills those via
        # the profile_writer fallback + the new blank-profile-as-missing guard
        # (P8). Report: evals/REPORT-TUNING-2026-07-02.md.
        model: gpt-4o-mini
        temperature: 0.3
        max_output_tokens: 6000
        timeout_s: 40
        json_output: true
      profile_improver:
        model: gemini/gemini-2.5-flash
        temperature: 0.3
        max_output_tokens: 1600
        timeout_s: 18
        json_output: true
      character_selector:
        model: gemini/gemini-2.5-flash
        temperature: 0.2
        max_output_tokens: 500
        timeout_s: 18
        json_output: true
      question_generator:
        # AC-PROD-R12-PERF-2 — switched from gemini/gemini-flash-latest to
        # gpt-4o-mini. Generates the BASELINE question batch (critical path:
        # user sees nothing until this returns). Prod traces show empty-output
        # failures from hidden-reasoning-token starvation under the existing
        # 5000 cap, plus 23s+ tail latency. gpt-4o-mini emits no reasoning
        # tokens — cap drops 5000 → 2500 (still room for 8–10 question batch),
        # timeout 45 → 25.
        #
        # AC-EVAL-2026-07-02 — MODEL KEPT (gpt-4o-mini); PROMPT OVERRIDE REMOVED.
        # Live eval (reps=20, judge gemini-2.5-pro) on the user-blocking critical
        # path:
        #   gpt-4o-mini (code default prompt):   3.66 [3.55,3.77]  100% valid  $0.35/1k  p95 12.0s
        #   gpt-4o-mini (App-Config CoT override): 3.41 [3.27,3.55] 100% valid  $0.35/1k  p95  6.8s
        #   gemini-flash-latest:                 4.97 [4.92,5.01]  100% valid  $6.03/1k  p95 14.4s
        #   gemini-2.5-flash-lite:               4.21             82% valid   $0.30/1k  (rejected: validity)
        # The CoT-styled App-Config override was a NET NEGATIVE for gpt-4o-mini
        # (3.41 < 3.66 code default, paired-t p=0.002), so the override was
        # REMOVED — this call now resolves to DEFAULT_PROMPTS (which carries the
        # anti-self-match FORBIDDEN block). NO gpt-4o-mini variant clears the 4.0
        # floor; only flash-latest does, at 17x the cost on the user-blocking
        # path prod deliberately moved OFF (R12: empty-output/latency in the live
        # pipeline). We keep the Pareto-best cheap+fast+100%-valid config and
        # accept the quality gap as a documented follow-up (prompt/few-shot work,
        # not model selection). Report: evals/REPORT-TUNING-2026-07-02.md.
        model: gpt-4o-mini
        temperature: 0.25
        max_output_tokens: 2500
        timeout_s: 25
        json_output: true
      next_question_generator:
        # AC-PROD-R11-PERF-1 — switched from gemini/gemini-flash-latest to
        # gpt-4o-mini. The per-question loop runs 6-12 times per quiz and
        # was the prod hotspot causing user-visible timeouts (see R11 spec).
        #
        # AC-EVAL-2026-07-02 — MODEL KEPT (gpt-4o-mini); PROMPT OVERRIDE REMOVED.
        # Live eval (reps=20, judge gemini-2.5-pro) on the #1 loop hotspot:
        #   gpt-4o-mini (code default prompt):   4.45 [4.35,4.55]  100% valid  $0.15/1k  p95 2.4s  ⬅ WINNER (clears 4.0 floor)
        #   gpt-4o-mini (App-Config CoT override): 4.36 [4.22,4.50] 100% valid  $0.17/1k  p95 6.6s
        #   gemini-flash-latest:                 4.77             100% valid   $3.04/1k  p95 7.1s
        #   gemini-2.5-flash-lite:               4.59             58% valid    (rejected: validity)
        # The CoT-styled App-Config override HURT this call: same quality band
        # but 2.75x the p95 latency (6.6s → 2.4s) for the same model. Removing
        # the override wins on cost, latency AND quality simultaneously, and the
        # code default keeps the FORBIDDEN block. This call now resolves to
        # DEFAULT_PROMPTS. gpt-4o-mini clears the 4.0 floor (CI-lower 4.35).
        # Report: evals/REPORT-TUNING-2026-07-02.md.
        model: gpt-4o-mini
        temperature: 0.25
        max_output_tokens: 1500
        timeout_s: 20
        json_output: true
      final_profile_writer:
        # AC-PROD-R13-FINAL-1 — switched back to gpt-4o-mini. The R7 rationale
        # for Gemini ("prod Container App has no OPENAI_API_KEY") is STALE:
        # AC-PROD-R11-INFRA-1 re-wired OPENAI_API_KEY into Key Vault + the
        # deploy pipeline for the gpt-4o-mini hotspot tools.
        #
        # AC-EVAL-2026-07-02 — CONFIRMED gpt-4o-mini (first LIVE validation vs
        # the strict 4.2 floor). Live eval (reps=20, judge gemini-2.5-pro):
        #   gpt-4o-mini:          4.68 [4.57,4.80]  100% valid  $0.35/1k  p95  9.6s  ⬅ ONLY variant clearing the 4.2 floor
        #   gpt-5-mini:           4.85 [4.68,4.98]   68% valid  $1.82/1k  p95 21.3s  (rejected: validity 68%<95%)
        #   gemini-flash-latest:  4.50               3% valid   $0.13/1k            (rejected: empty-output starvation)
        # gpt-4o-mini is the cost→quality→perf winner AND the only floor-clearer.
        # gpt-5-mini scores higher but ships usable output only 2/3 of the time
        # (reasoning-token truncation); flash-latest collapses to 3% valid — the
        # same failure that forced the R11/R12/R13 switches. Report:
        # evals/REPORT-TUNING-2026-07-02.md.
        model: gpt-4o-mini
        temperature: 0.3
        max_output_tokens: 1500
        timeout_s: 30
        json_output: true
      error_analyzer:
        model: gemini/gemini-2.5-flash
        temperature: 0.2
        max_output_tokens: 600
        timeout_s: 12
        json_output: true
      failure_explainer:
        model: gemini/gemini-2.5-flash
        temperature: 0.2
        max_output_tokens: 500
        timeout_s: 12
        json_output: true
      image_prompt_enhancer:
        model: gemini/gemini-2.5-flash
        temperature: 0.6
        max_output_tokens: 600
        timeout_s: 18
        json_output: true
      decision_maker:
        # AC-PROD-R11-PERF-2 — switched from gemini/gemini-flash-latest to
        # gpt-4o-mini. Same loop hotspot as next_question_generator. Bench
        # (5 reps, prod-shape prompt, max_output_tokens=4000):
        #   gpt-4o-mini:               mean 1.5s  p95 1.8s  validity 5/5
        #   gemini-flash-latest (was):  mean 3.4s  p95 7.0s validity 5/5
        # Decision JSON is tiny (~90 chars) and gpt-4o-mini emits no
        # reasoning tokens, so the cap drops 4000 → 500.
        model: gpt-4o-mini
        temperature: 0.2
        max_output_tokens: 500
        timeout_s: 15
        json_output: true
      web_search:
        model: gemini/gemini-2.5-flash
        temperature: 0.2
        max_output_tokens: 1200
        timeout_s: 20
        json_output: false
        allowed_domains: []
        user_location:
          type: approximate
          country: US
          city: Seattle
          region: WA
          timezone: America/Los_Angeles
        include_sources: true
        tool_choice: auto
    prompts:
      initial_planner:
        system_prompt: 'You are a master planner for viral personality quizzes.


          Think step-by-step privately about (a) what makes a great answer, (b) likely failure modes,
          and (c) the explicit JSON schema. Do NOT include your reasoning in the response. Return ONLY
          the required JSON object.'
        user_prompt_template: "Before composing the JSON, internally check: (1) does this match the schema\
          \ exactly?  (2) is the tone consistent with the creativity_mode? (3) does each field actively\
          \ earn its place?  Then output the JSON.\n\nPlan a BuzzFeed-style personality quiz about '{category}'.\n\
          If this concept implies proper names (e.g., characters, artists, teams), prefer returning proper\
          \ names over generic archetypes.\nIMPORTANT — character vs dimension: if the topic NAMES an\
          \ explicit dimension of a fictional universe (e.g. a race, house, faction, side, alignment,\
          \ class, species, region, clan, or element — 'Lord of the Rings Race', 'Harry Potter House',\
          \ 'Star Wars faction'), the outcomes are the MEMBERS of THAT dimension (e.g. Hobbits/Elves/Dwarves/Men,\
          \ the four houses, the factions), NOT the franchise's named characters. Only return named characters\
          \ when the topic is the franchise alone with no dimension qualifier.\nOutcome kind: {outcome_kind}\
          \ (a value of 'dimension' means: return members of the named dimension, not characters). Creativity\
          \ mode: {creativity_mode}. User intent: {intent}.\n\nIf a canonical list is provided, return it\
          \ exactly and in the same order.\nCanonical (optional): {canonical_names}\n\nReturn ONLY this JSON\
          \ object:\n{{\n  \"title\": string,                 // catchy; default to \"What {category} Are You?\"\
          \ if unsure\n  \"synopsis\": string,              // 3–4 sentences; playful if whimsical, precise\
          \ if factual\n  \"ideal_archetypes\": string[],    // Specific and relevant labels/characters/types\n\
          \  \"ideal_count_hint\": number       // More is OK\n}}"
