    content:
      appName: quafel
      landingPage:
        title: Discover Your True Personality
        subtitle: "A personality quiz for\u2026 everything."
        placeholder: Hogwarts house
        buttonText: Create My Quiz
        examples:
        - The Office
        - Ancient Rome
        inputAriaLabel: Quiz Topic
        validation:
          minLength: Must be at least {min} characters.
          maxLength: Cannot exceed {max} characters.
      aboutPage:
        title: About quafel
        description: Learn more about quafel and how it works.
        body: |
          ## What is quafel?

          quafel is a free, AI-powered personality quiz platform. Enter any topic — a TV show,
          a historical era, a hobby, or anything you're curious about — and we'll generate a fun,
          personalised quiz that reveals which character, archetype, or style matches you best.

          ## How It Works

          1. **Choose a topic** — type anything into the search bar on the home page.
          2. **Answer the questions** — our AI crafts questions tailored to your topic.
          3. **Discover your result** — receive a rich personality profile based on your answers.
          4. **Share** — copy your result link and share with friends.

          ## Our Mission

          We believe self-discovery should be playful. quafel combines large-language-model
          technology with the timeless appeal of personality quizzes to create moments of surprise,
          reflection, and joy.

          ## Privacy First

          We don't require an account, and we never ask for your name or email. To keep your shared
          result link working, we do store your quiz session (topic, answers, and result) — and we
          use a few first-party, non-identifying analytics events that respect Do Not Track. We don't
          use third-party tracking or ad pixels. See our [Privacy Policy](/privacy) for the full picture.

          ## Get in Touch

          Found a bug? Have a suggestion? We'd love to hear from you — reach us at support [at] quafel [dot] com,
          or consider [supporting the project](/donate) to help keep the lights on.
      termsPage:
        title: Terms of Service
        description: Read our terms and conditions for using quafel.
        body: |
          *Last updated: June 2026*

          Please read these Terms of Service carefully before using quafel.

          ## 1. Acceptance of Terms

          By accessing or using quafel ("the Service"), you agree to be bound by these Terms.
          If you do not agree, please discontinue use immediately.

          ## 2. Use of the Service

          - The Service is provided for personal, non-commercial use.
          - You must not use the Service to generate content that is illegal, harmful, or violates
            the rights of others.
          - Automated scraping or bulk use of the Service without prior written consent is prohibited.

          ## 3. AI-Generated Content, Third-Party Providers, and Safety

          Quiz questions, character profiles, and personality results are generated by
          third-party AI providers — including OpenAI, Google (Gemini), and fal.ai (for
          image generation) — and delivered over Cloudflare. They are provided for
          entertainment purposes only and do not constitute professional advice of any
          kind (psychological, medical, legal, or otherwise).

          Content you submit and the content the Service generates are processed by those
          third-party providers, whose own safety, moderation, and content policies govern
          what may be generated. quafel applies no additional content-safety filtering of
          its own and relies on these providers for that function; by using the Service you
          also agree to their acceptable-use policies. If you encounter anything concerning,
          please report it to support [at] quafel [dot] com.

          ## 4. Intellectual Property and Licensing

          The quafel name, logo, and original interface design are owned by the project
          maintainers. Quiz content is generated on demand by the third-party AI providers
          named above; the licensing and intellectual-property status of that AI-generated
          material — including any resemblance to real people, brands, or existing works —
          is the responsibility of those providers and of the user who requests it, not of
          quafel. AI-generated quiz content is not claimed as proprietary by quafel; you may
          share your results freely.

          ## 5. Disclaimer of Warranties

          The Service is provided **"as is"** without warranties of any kind. We do not guarantee
          uptime, accuracy of AI output, or fitness for a particular purpose.

          ## 6. Limitation of Liability

          To the fullest extent permitted by law, the project maintainers shall not be liable for
          any indirect, incidental, or consequential damages arising from your use of the Service.

          ## 7. Changes to Terms

          We may update these Terms from time to time. Continued use of the Service after changes
          are posted constitutes acceptance of the revised Terms.

          ## 8. Contact

          Questions about these Terms? Contact us at support [at] quafel [dot] com.
      privacyPolicyPage:
        title: Privacy Policy
        description: Understand how we handle your data and privacy.
        body: |
          *Last updated: June 2026*

          Your privacy matters. This policy explains what data quafel collects, how it is used, who we share it with, and the choices you have. quafel does not require an account and never asks for your name, email, or other identifying details to take a quiz.

          ## Information We Collect

          | Category | Details |
          |---|---|
          | **Quiz topic** | The topic you enter. It is sent to our AI providers to generate your quiz and is stored with your quiz session (see Data Retention). |
          | **Quiz answers & result** | The questions, your answers, the generated characters, and your final result are stored with your quiz session so the result link keeps working. |
          | **Optional feedback** | If you rate or comment on a result, your rating and any text you submit are stored with that session. |
          | **Abuse signals** | A one-way hash of your IP address may be stored if content is flagged, solely to prevent abuse. We do not store your raw IP with your quiz. |
          | **Product analytics** | We record a few first-party, non-identifying events (see Analytics below). |

          We do **not** collect names, email addresses, or other personally identifiable information.

          ## Analytics

          quafel uses a lightweight, **first-party** analytics funnel — there is **no third-party analytics SDK, no advertising pixel, and no cross-site tracking**. We record only three coarse events — when a quiz starts, when a quiz completes, and when a result is shared (including the share channel, e.g. "copy" or "x"). These events carry **no personal data and no quiz content**; the event payload is strictly allow-listed on the server and your IP address is not recorded with it.

          We honour **Do Not Track**: if your browser sends a Do-Not-Track signal, we send no analytics events at all.

          ## Cookies & Local Storage

          quafel sets **no cookies** of its own and loads **no tracking cookies**. We use your browser's `sessionStorage` to keep your in-progress quiz working (cleared when you close the tab), and `localStorage` only to remember a reduced-motion display preference. Cloudflare Turnstile (see below), our font provider, and the Ko-fi donate widget may set their own cookies or make their own requests when those features are active.

          ## Third-Party Services

          Your quiz topic and answers are sent to the following providers so we can generate your quiz. Please review each provider's own privacy policy for how they handle data:

          - **AI text providers** — quiz questions, characters, and results are generated using large-language-model APIs from **Google (Gemini)** and **OpenAI**.
          - **AI image provider** — character and result images are generated using **fal.ai (FAL)**.
          - **Cloudflare Turnstile** — used for bot protection on quiz creation. Cloudflare processes a challenge token and, when enabled, your IP address for verification; no quiz content is shared with it.
          - **Google Fonts** — web fonts are loaded from Google's CDN, which may receive your IP address as part of serving the fonts.
          - **Ko-fi** — our "Donate" button and donation page are powered by Ko-fi. When you open the donate widget or visit our Ko-fi page, Ko-fi may receive your IP address and set its own cookies, and any contribution is processed entirely by Ko-fi and its payment processors. No quiz content is shared with it.

          ## Data Retention

          Your in-progress quiz state is held in a short-lived server cache (about one hour) and in your browser's `sessionStorage`. Completed quiz sessions — topic, questions, answers, characters, result, and any feedback — are stored in our database so shared result links keep working. None of this is personally identifying — quafel requires no account, name, email, or login — so we keep it indefinitely to keep shared links working and to help us improve the quizzes. You can still request deletion of a specific result by contacting us (see below) with the result link.

          ## Your Choices & Rights

          - Enable **Do Not Track** in your browser to switch off analytics entirely.
          - Because we never collect your name or email, stored quiz sessions are not linked to your identity.
          - To request deletion of a specific stored result, contact us at support [at] quafel [dot] com with the result URL.

          ## Changes to This Policy

          We may revise this policy to reflect changes in law or our practices. The date at the top of this page will always reflect the most recent update.
      donatePage:
        title: Support quafel
        description: Help keep quafel free and running.
        body: |
          quafel is free for everyone, with no accounts and no ads. If you've enjoyed discovering
          your personality through our quizzes, you can help keep it that way.

          ## Why Support quafel?

          Generating quizzes with AI isn't free — every quiz makes calls to AI text and image
          providers, and those costs add up. Your support goes directly toward keeping quafel
          running and free to use:

          - **AI costs** — text and image generation is the largest ongoing expense.
          - **Infrastructure** — the servers, database, and bandwidth that serve your quizzes.

          Every bit helps, and there's no pressure — using and sharing quafel is support too.

          ## Other Ways to Help

          - Share your quiz results with friends.
          - Tell someone who might enjoy quafel.
          - Let us know what you think so we can make it better.

          ## Thank You

          Whether you contribute, share, or simply use the app — **thank you**. You're the reason
          we keep building.
