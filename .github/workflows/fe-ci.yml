name: "Web: CI (lint, typecheck, build, unit)"

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/fe-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/fe-ci.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  quality:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (clean)
        run: npm ci --no-audit --no-fund

      - name: Lint (errors only)
        run: npx eslint . --max-warnings=999

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build (production)
        env:
          VITE_API_BASE_URL: https://api-quizzical-dev.whitesea-815b33ea.westus2.azurecontainerapps.io/api/v1
        run: npm run build

      - name: Bundle-size budget
        env:
          MAX_CHUNK_KB: '600'
        run: npm run size-check

      - name: Unit tests (vitest)
        run: npx vitest run --reporter=default

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist
          retention-days: 7

  audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      # Fail on high/critical only; production-only deps.
      - name: Audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high
