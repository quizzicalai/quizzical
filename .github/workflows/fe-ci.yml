name: "Web: CI (lint, typecheck, build, unit)"

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/fe-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/fe-ci.yml'
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  quality:
    name: Lint + Typecheck + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (clean)
        run: npm ci --no-audit --no-fund

      - name: Lint (zero warnings)
        run: npx eslint . --max-warnings=0

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build (production)
        env:
          VITE_API_BASE_URL: https://api-quizzical-dev.whitesea-815b33ea.westus2.azurecontainerapps.io/api/v1
        run: npm run build

      - name: Bundle-size budget
        env:
          MAX_CHUNK_KB: '600'
        run: npm run size-check

      - name: Unit tests (vitest)
        run: npx vitest run --reporter=default

      # AC-PROD-R13-COVERAGE-1 — run Playwright Component Tests so
      # parent-level visibility regressions in QuizFlowPage (e.g. the
      # one where the upper-right two-dot ThinkingIndicator was hidden
      # entirely on settled questions) are caught in CI, not in prod.
      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Component tests (Playwright CT, chromium only)
        run: npm run test-ct -- --project=chromium

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist
          retention-days: 7

  audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      # Fail on high/critical only; production-only deps.
      - name: Audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

  e2e:
    name: E2E (Playwright, chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # E2E suite is designed to run against the full Docker stack (per
    # repo convention: "e2e should mock as little as possible"). The
    # mock-backed dev:e2e harness used here is informational only and is
    # not a deploy gate (SWA workflow's quality_gate guards FE deploys).
    # Mark non-blocking until the suite is stabilized for the CI mock
    # harness; failures still surface as a yellow check on the run.
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (clean)
        run: npm ci --no-audit --no-fund
      - name: Install Playwright browsers (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run end-to-end tests (chromium-only, mock-backed dev:e2e)
        env:
          CI: 'true'
        run: npx playwright test --project=chromium --reporter=line
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-artifacts/report
          retention-days: 7
