# .github/workflows/azure-static-web-apps.yml
name: "Web: Build & Deploy (Azure Static Web Apps)"

on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-static-web-apps-kind-smoke-0ca2ff21e.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/azure-static-web-apps-kind-smoke-0ca2ff21e.yml'
  workflow_dispatch: {}

# Cancel superseded runs but only within this workflow+ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Principle of least privilege (only what SWA needs for PR comments & reads)
permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # -----------------------------------------------------------
  # CI gate (blocks deploy). Mirrors fe-ci.yml so this workflow
  # is self-contained: a SWA push/PR cannot deploy without the
  # quality bar being green here too. Lint, typecheck, unit tests
  # (incl. a11y specs in src/__a11y__/), and a production build
  # all must pass. PR previews also run this gate before deploy.
  # -----------------------------------------------------------
  quality_gate:
    name: "Quality gate (lint, typecheck, unit, build)"
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies (clean)
        run: npm ci --no-audit --no-fund
      - name: Lint (zero warnings)
        run: npx eslint . --max-warnings=0
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests (vitest, includes a11y specs)
        run: npx vitest run --reporter=default
      - name: Build (production)
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api-quizzical-dev.whitesea-815b33ea.westus2.azurecontainerapps.io/api/v1' }}
        run: npm run build
      - name: Bundle-size budget
        env:
          MAX_CHUNK_KB: '600'
        run: npm run size-check
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

  build_and_deploy:
    needs: [quality_gate]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build & Deploy

    # Centralize these to keep the 'with:' clean & consistent
    env:
      APP_LOCATION: frontend
      API_LOCATION: ""          # no Functions app; leave blank
      OUTPUT_LOCATION: dist
      PRODUCTION_BRANCH: main

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true
          lfs: false

      # Pass VITE_API_BASE_URL from the repo variable first, falling back to a
      # hardcoded default so the build never silently produces a broken bundle.
      # To change the API URL: update the repo variable VITE_API_BASE_URL via
      # GitHub Settings → Variables (or gh variable set).
      - name: Build & Deploy to Azure Static Web Apps
        # Immutable pin recommended by GitHub Docs
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://api-quizzical-dev.whitesea-815b33ea.westus2.azurecontainerapps.io/api/v1' }}
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_SMOKE_0CA2FF21E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # enables PR comments/status
          action: upload
          app_location: ${{ env.APP_LOCATION }}
          api_location: ${{ env.API_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}
          production_branch: ${{ env.PRODUCTION_BRANCH }}
          # Optional: bump if your build sometimes exceeds 15 min default
          build_timeout_in_minutes: 30
          # Optional: If you want a custom build command instead of Oryx defaults:
          # app_build_command: "npm ci && npm run build"

  # -----------------------------------------------------------
  # Post-deploy smoke: verify the live SWA loads correctly and
  # the API is reachable. Fails the workflow if the site is broken
  # so a bad deploy surfaces immediately rather than in user traffic.
  # -----------------------------------------------------------
  smoke:
    name: "Live smoke (SWA + API)"
    runs-on: ubuntu-latest
    needs: build_and_deploy
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 5
    steps:
      - name: Verify SWA returns 200 and contains app title
        run: |
          set -euo pipefail
          SWA_URL="https://kind-smoke-0ca2ff21e.3.azurestaticapps.net"
          echo "Probing SWA at ${SWA_URL}"
          BODY="$(curl -fsS --max-time 30 "${SWA_URL}")"
          echo "HTTP 200 OK"
          # Ensure the index.html was served (not a blank/error page)
          if ! echo "$BODY" | grep -qi "Quizzical"; then
            echo "ERROR: response body does not contain 'Quizzical'"
            echo "First 500 chars:"
            echo "${BODY:0:500}"
            exit 1
          fi
          echo "SWA smoke PASSED"

      - name: Verify API /health is reachable from SWA origin
        run: |
          set -euo pipefail
          API_URL="https://api-quizzical-dev.whitesea-815b33ea.westus2.azurecontainerapps.io"
          echo "Probing API health at ${API_URL}/health"
          STATUS="$(curl -fsS --max-time 30 "${API_URL}/health" | jq -r '.status // empty')"
          if [[ "$STATUS" != "ok" ]]; then
            echo "ERROR: /health returned status='${STATUS}' (expected 'ok')"
            exit 1
          fi
          echo "API health PASSED (status=${STATUS})"

      - name: Write smoke summary
        if: always()
        run: |
          {
            echo "## SWA Smoke"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| SWA 200 + title | ✅ |"
            echo "| API /health ok  | ✅ |"
          } >> "$GITHUB_STEP_SUMMARY"

  close_preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Preview Environment
    steps:
      - name: Close Pull Request Preview
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_KIND_SMOKE_0CA2FF21E }}
          action: close
