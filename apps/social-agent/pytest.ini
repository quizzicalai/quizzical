# Local pytest config: keeps the repo-root pytest.ini (backend-specific
# coverage/asyncio addopts) from applying to this app. Run from this directory:
#   .venv\Scripts\python -m pytest
# or with the backend venv python — tests are stdlib+pytest only (no network).
[pytest]
testpaths = tests
pythonpath = .
addopts = -q
filterwarnings =
    ignore::DeprecationWarning
